<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Vanilla Ice Cream</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="body-meals">

    <div class="header">
        <a href="index.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Vanilla Ice Cream </h1>

                <p>Smooth and creamy vanilla ice cream made with fresh ingredients. A refreshing dessert that melts in your mouth and is perfect after any meal.</p>

                <img src="images/Vanilla Ice Cream.jpg" alt="Vanilla Ice Cream" class="restaurant-details-img">

                <p><b>Price:</b> R25</p>
                <p><b>Serving Size:</b> 2 Scoops</p>

                <h3>Extras</h3>
                <ul>
                    <li>Chocolate syrup</li>
                    <li>Caramel sauce</li>
                    <li>Sprinkles</li>
                    <li>Crushed nuts</li>
                </ul>

                <h3>Special Requests</h3>
                <form>
                    <textarea placeholder="Add notes for your order"></textarea>
                    <br><br>
                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>
