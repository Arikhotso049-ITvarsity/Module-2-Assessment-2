<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Smoothie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontAwesome/css/all.css">
</head>

<body class="body-meals">

    <div class="header">
        <a href="drinks.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Berry Blast Smoothie </h1>

                <p>A refreshing blend of strawberries, blueberries, and bananas mixed with yogurt and ice. 
                Perfect for a healthy and delicious drink any time of the day.</p>

                <img src="images/Fruit Smoothie.jpg" alt="Fruit Smoothie" class="restaurant-details-img">

                <p><b>Price:</b> R35</p>
                <p><b>Serving Size:</b> 500ml Cup</p>

                <h3>Extras</h3>
                <form class="restaurant-details-ingredients">
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Protein powder</label>
                    <br>

                    <input id="check-02" type="checkbox">
                    <label for="check-02">Chia seeds</label>
                    <br>

                    <input id="check-03" type="checkbox">
                    <label for="check-03">Honey drizzle</label>
                    <br>

                    <input id="check-04" type="checkbox">
                    <label for="check-04">Extra fruit</label>
                    <br><br>

                    <h3>Special Requests</h3>
                    <textarea placeholder="Add notes for your order"></textarea>
                    <br><br>

                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
