<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Steak & Chips</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontAwesome/css/all.css">
</head>

<body class="body-meals">

    <div class="header">
        <a href="meals.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Steak & Chips </h1>

                <p>A juicy grilled steak served with crispy golden chips. 
                Cooked to perfection and served hot for a delicious and satisfying meal.</p>

                <img src="images/grilled steak.jpg" alt="Steak and Chips" class="restaurant-details-img">

                <p><b>Price:</b> R95</p>
                <p><b>Serving Size:</b> 1 Plate</p>

                <h3>Extras</h3>
                <form class="restaurant-details-ingredients">
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Pepper sauce</label>
                    <br>

                    <input id="check-02" type="checkbox">
                    <label for="check-02">Mushroom sauce</label>
                    <br>

                    <input id="check-03" type="checkbox">
                    <label for="check-03">Side salad</label>
                    <br>

                    <input id="check-04" type="checkbox">
                    <label for="check-04">Extra chips</label>
                    <br><br>

                    <h3>Special Requests</h3>
                    <textarea placeholder="Add notes for your order"></textarea>
                    <br><br>

                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
