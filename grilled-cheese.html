<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Grilled Cheese</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontAwesome/css/all.css">
</head>

<body class="body-meals">

    <div class="header">
        <a href="meals.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Grilled Cheese Sandwich </h1>

                <p>A warm and crispy grilled sandwich filled with melted cheese. 
                Perfectly toasted bread with gooey cheese inside for a simple and delicious meal.</p>

                <img src="images/Grilled Cheese Sandwich.jpg" alt="Grilled Cheese Sandwich" class="restaurant-details-img">

                <p><b>Price:</b> R40</p>
                <p><b>Serving Size:</b> 1 Sandwich</p>

                <h3>Extras</h3>
                <form class="restaurant-details-ingredients">
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Tomato slices</label>
                    <br>

                    <input id="check-02" type="checkbox">
                    <label for="check-02">Bacon</label>
                    <br>

                    <input id="check-03" type="checkbox">
                    <label for="check-03">Extra cheese</label>
                    <br>

                    <input id="check-04" type="checkbox">
                    <label for="check-04">Side chips</label>
                    <br><br>

                    <h3>Special Requests</h3>
                    <textarea placeholder="Add notes for your order"></textarea>
                    <br><br>

                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
