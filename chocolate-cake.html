<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Chocolate Cake</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontAwesome/css/all.css">
</head>

<body class="body-meals">

    <div class="header">
        <a href="meals.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Chocolate Cake</h1>

                <p>Rich, moist chocolate cake layered with creamy chocolate frosting. Perfect for chocolate lovers and a sweet ending to any meal.</p>

                <img src="images/chocolate lava cakes.jpg" alt="Chocolate Cake" class="restaurant-details-img">

                <p><b>Price:</b> R60</p>
                <p><b>Serving Size:</b> 1 Slice</p>

                <h3>Extras</h3>
                <form class="restaurant-details-ingredients">
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Whipped cream</label><br>

                    <input id="check-02" type="checkbox">
                    <label for="check-02">Chocolate chips</label><br>

                    <input id="check-03" type="checkbox">
                    <label for="check-03">Strawberry topping</label><br>

                    <input id="check-04" type="checkbox">
                    <label for="check-04">Extra frosting</label><br><br>

                    <h3>Special Requests</h3>
                    <textarea placeholder="Add notes for your order"></textarea><br><br>

                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
