<!DOCTYPE html>
<html>
<head>
    <title>Golden Restaurants | Lemonade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fontAwesome/css/all.css">
</head>
<body class="body-meals">

    <div class="header">
        <a href="drinks.html">
            <i class="fas fa-arrow-left"></i>
        </a>
        <img id="logo-text" src="images/logo-text.png" alt="Logo Text">
    </div>

    <div id="meals">
        <div class="meals-list">

            <div class="restaurant-details">

                <h1>Fresh Lemonade</h1>

                <p>A cool and refreshing lemonade made with freshly squeezed lemons, sugar, and chilled water. Perfect for a hot day.</p>

                <img src="images/Lemonade.jpg" alt="Fresh Lemonade" class="restaurant-details-img">

                <p><b>Price:</b> R20</p>
                <p><b>Serving Size:</b> 400ml Glass</p>

                <h3>Extras</h3>
                <form class="restaurant-details-ingredients">
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Mint leaves</label>
                    <br>

                    <input id="check-02" type="checkbox">
                    <label for="check-02">Extra lemon slices</label>
                    <br>

                    <input id="check-03" type="checkbox">
                    <label for="check-03">Honey</label>
                    <br>

                    <input id="check-04" type="checkbox">
                    <label for="check-04">Extra ice</label>
                    <br><br>

                    <h3>Special Requests</h3>
                    <textarea placeholder="Add notes for your order"></textarea>
                    <br><br>

                    <a href="thankyou.html">
                        <button type="button">Place Order</button>
                    </a>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
